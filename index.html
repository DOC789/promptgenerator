<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Generator Marketplace Prompt Builder</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
-webkit-user-select:none;
user-select:none;
}

body{
background:#fff8e1;
padding:15px;
color:#333;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
margin-bottom:20px;
}

h1,h2{
text-align:center;
color:#d32f2f;
margin-bottom:15px;
}

input,
textarea,
select{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:12px;
font-size:14px;
}

textarea{
min-height:120px;
resize:vertical;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:15px;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-top:8px;
}

.btn-generate{
background:#ff9800;
color:white;
}

.btn-copy{
background:#4caf50;
color:white;
}

.btn-reset{
background:#2196f3;
color:white;
}

.btn-logout{
background:#d32f2f;
color:white;
}

.output{
background:#fafafa;
border:2px dashed #ff9800;
padding:15px;
border-radius:15px;
white-space:pre-wrap;
min-height:250px;
overflow:auto;
}

.hidden{
display:none;
}

.logo-preview{
width:100%;
max-height:180px;
object-fit:contain;
border-radius:12px;
margin-bottom:10px;
border:1px solid #ddd;
}

.login-box{
max-width:400px;
margin:auto;
margin-top:60px;
}

.footer{
text-align:center;
margin-top:20px;
font-size:12px;
color:#777;
}

</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->

<div id="loginPage" class="card login-box">

<h1>
<i class="fa-solid fa-store"></i>
Login Generator
</h1>

<input type="text"
id="userid"
placeholder="User ID">

<input type="password"
id="password"
placeholder="Password">

<button class="btn-generate"
onclick="login()">
Masuk
</button>

</div>

<!-- GENERATOR -->

<div id="generatorPage" class="hidden">

<div class="card">

<h1>
<i class="fa-solid fa-shop"></i>
Generator Marketplace Website
</h1>

<label>Nama Website / Toko</label>
<input type="text"
id="nama"
value="TOKO DIGITAL INDONESIA">

<label>Logo URL</label>
<input type="text"
id="logo"
value="https://dummyimage.com/400x200/ff9800/ffffff&text=LOGO">

<img id="preview"
class="logo-preview"
src="https://dummyimage.com/400x200/ff9800/ffffff&text=LOGO">

<label>Deskripsi Singkat</label>
<textarea id="deskripsi">Marketplace produk digital modern yang menjual ebook, template, kursus online, dan layanan digital.</textarea>

<label>Nomor WhatsApp</label>
<input type="text"
id="wa"
value="6281234567890">

<label>Jenis Website</label>

<select id="jenis">

<option>Marketplace</option>
<option>Toko Online</option>
<option>Personal Branding</option>
<option>Informasi Perusahaan</option>
<option>Landing Page</option>

</select>

<label>Warna Desain</label>

<input type="text"
id="warna"
value="Merah dan Kuning Modern">

<label>Perintah Tambahan</label>

<textarea id="tambahan">Buat tampilan profesional, mobile friendly, modern dan cepat.</textarea>

<button class="btn-generate"
onclick="generatePrompt()">
Generate Prompt
</button>

<button class="btn-copy"
onclick="copyPrompt()">
Copy Hasil
</button>

<button class="btn-reset"
onclick="resetForm()">
Reset
</button>

<button class="btn-logout"
onclick="logout()">
Logout
</button>

</div>

<div class="card">

<h2>Hasil Prompt</h2>

<div class="output"
id="hasil">
Prompt akan muncul di sini...
</div>

</div>

</div>

<div class="footer">
Generator Marketplace Prompt Builder
</div>

</div>

<script>

/* LOGIN */

const DEFAULT_USER="admin";
const DEFAULT_PASS="123";

function login(){

let user=document.getElementById("userid").value;
let pass=document.getElementById("password").value;

if(user===DEFAULT_USER && pass===DEFAULT_PASS){

document.getElementById("loginPage").style.display="none";

document.getElementById("generatorPage").classList.remove("hidden");

}
else{

alert("UserID atau Password salah");

}

}

function logout(){

location.reload();

}

/* PREVIEW LOGO */

document.getElementById("logo").addEventListener("input",function(){

document.getElementById("preview").src=this.value;

});

/* GENERATE */

function generatePrompt(){

let nama=document.getElementById("nama").value;
let logo=document.getElementById("logo").value;
let deskripsi=document.getElementById("deskripsi").value;
let wa=document.getElementById("wa").value;
let jenis=document.getElementById("jenis").value;
let warna=document.getElementById("warna").value;
let tambahan=document.getElementById("tambahan").value;

if(
nama==="" ||
deskripsi==="" ||
wa===""
){

alert("Lengkapi data terlebih dahulu");
return;

}

let hasil=`

========================
PROMPT HTML
========================

Buatkan website ${jenis} profesional.

DATA WEBSITE:

Nama Website:
${nama}

Logo:
${logo}

Deskripsi:
${deskripsi}

WhatsApp:
${wa}

Warna Desain:
${warna}

KETENTUAN:

- HTML satu file
- CSS internal
- Responsive Mobile First
- Card Rounded
- Font Awesome
- Tombol WhatsApp
- Hero Section
- Produk Section
- Testimoni
- Footer
- SEO Friendly
- Modern UI
- Cepat dan ringan

PERINTAH TAMBAHAN:

${tambahan}


========================
PROMPT JAVASCRIPT
========================

Buatkan JavaScript internal untuk website ${jenis}.

FITUR:

- Navigasi mobile
- Tombol WhatsApp
- Animasi scroll
- Form validasi sederhana
- Tombol back to top
- Smooth scrolling
- Responsive interaction
- Tanpa framework
- Tanpa API
- Tanpa backend

DATA:

Nama Website:
${nama}

Nomor WA:
${wa}

Instruksi Tambahan:

${tambahan}

`;

document.getElementById("hasil").innerText=hasil;

}

/* COPY */

function copyPrompt(){

let text=document.getElementById("hasil").innerText;

navigator.clipboard.writeText(text);

alert("Prompt berhasil dicopy");

}

/* RESET */

function resetForm(){

document.getElementById("nama").value="";
document.getElementById("logo").value="";
document.getElementById("deskripsi").value="";
document.getElementById("wa").value="";
document.getElementById("warna").value="";
document.getElementById("tambahan").value="";
document.getElementById("hasil").innerText="Prompt akan muncul di sini...";

}

/* SECURITY */

/* Disable Right Click */

document.addEventListener("contextmenu",
e=>e.preventDefault());

/* Disable Drag */

document.addEventListener("dragstart",
e=>e.preventDefault());

/* Disable Copy */

document.addEventListener("copy",
e=>e.preventDefault());

/* Disable Keys */

document.addEventListener("keydown",function(e){

if(e.key==="F12"){
e.preventDefault();
}

if(e.ctrlKey && e.key==="u"){
e.preventDefault();
}

if(e.ctrlKey && e.key==="s"){
e.preventDefault();
}

if(e.ctrlKey &&
e.shiftKey &&
e.key==="I"){
e.preventDefault();
}

});

/* DevTools Detection */

setInterval(function(){

let start=new Date();

debugger;

let end=new Date();

if(end-start>100){

document.body.innerHTML=
"<h1 style='text-align:center;padding:50px;color:red'>DevTools Terdeteksi</h1>";

}

},1000);

</script>

</body>
</html>
